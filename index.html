<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://turbowarp.org/889388814/embed" 
        allowtransparency="true" 
        allowfullscreen="true" 
        scrolling="no" 
        style="color-scheme: auto">
    </iframe>
</body>
</html>
